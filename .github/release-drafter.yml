name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '🚀 Features'
    labels: ['feature', 'enhancement']
  - title: '🐛 Bug Fixes'
    labels: ['fix', 'bugfix', 'bug']
  - title: '🔒 Security'
    labels: ['security']
  - title: '🧰 Maintenance'
    labels: ['chore', 'dependencies', 'refactor']

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
no-changes-template: '- No notable changes'

version-resolver:
  major:
    labels: ['major', 'breaking-change']
  minor:
    labels: ['minor', 'feature', 'enhancement']
  patch:
    labels: ['patch', 'fix', 'bugfix', 'bug', 'chore', 'dependencies', 'security']
  default: patch

template: |
  ## Changes

  $CHANGES
